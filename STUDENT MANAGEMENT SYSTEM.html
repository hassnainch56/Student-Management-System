<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root {
            --sidebar-width: 260px;
            --primary-color: #4e73df;
            --dark-bg: #1a1c23;
        }
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background-color: var(--dark-bg);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }
        .sidebar .nav-link {
            color: #a0aec0;
            padding: 12px 20px;
            margin: 4px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.1);
        }
        .sidebar .nav-link.active {
            background-color: var(--primary-color);
        }
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 30px;
            min-height: 100vh;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.05);
        }
        .stat-card {
            border-left: 4px solid var(--primary-color);
        }
        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ddd;
        }
        .table-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }
        .error-feedback {
            font-size: 0.825rem;
            color: #e74a3b;
            display: none;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="sidebar d-flex flex-column p-3">
        <div class="d-flex align-items-center gap-2 px-3 py-4 border-bottom border-secondary mb-4">
            <i class="bi bi-mortarboard-fill text-primary fs-3"></i>
            <span class="text-white fw-bold fs-5">EduManage Pro</span>
        </div>
        <ul class="nav nav-pills flex-column mb-auto">
            <li><a href="#" class="nav-link active"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="#" class="nav-link" data-bs-toggle="modal" data-bs-target="#studentModal" onclick="openAddModal()"><i class="bi bi-person-plus-fill"></i> Add / Import</a></li>
        </ul>
        <div class="px-3 text-muted small">v3.0 Bulk Active</div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 mb-0 text-gray-800 fw-bold">System Dashboard</h1>
                <p class="text-muted mb-0">Overview of academic records and bulk systems.</p>
            </div>
            <button class="btn btn-primary d-flex align-items-center gap-2 shadow-sm" data-bs-toggle="modal" data-bs-target="#studentModal" onclick="openAddModal()">
                <i class="bi bi-plus-lg"></i> Register / Bulk Import
            </button>
        </div>

        <div class="row mb-4">
            <div class="col-xl-6 col-md-6 mb-4">
                <div class="card stat-card h-100 py-2 bg-white">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col">
                                <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">Total Enrolled</div>
                                <div class="h5 mb-0 font-weight-bold text-gray-800" id="totalCount">0</div>
                            </div>
                            <div class="col-auto"><i class="bi bi-people-fill fs-2 text-muted"></i></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xl-6 col-md-6 mb-4">
                <div class="card stat-card h-100 py-2 bg-white border-start border-success" style="border-left-color: #1cc88a !important;">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col">
                                <div class="text-xs font-weight-bold text-success text-uppercase mb-1">Active Courses</div>
                                <div class="h5 mb-0 font-weight-bold text-gray-800" id="courseCount">0</div>
                            </div>
                            <div class="col-auto"><i class="bi bi-book-half fs-2 text-muted"></i></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow mb-4">
            <div class="card-header bg-white py-3 d-flex flex-wrap justify-content-between align-items-center gap-3">
                <h6 class="m-0 font-weight-bold text-dark fs-5 fw-semibold">Student Database Directory</h6>
                <div style="max-width: 350px;" class="w-100">
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" id="dbSearchInput" class="form-control bg-light border-start-0" placeholder="Filter by keyword...">
                    </div>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table
